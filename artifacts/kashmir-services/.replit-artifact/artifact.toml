kind = "web"
previewPath = "/"
title = "Kashmir Local Services"
version = "1.0.0"
id = "artifacts/kashmir-services"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18592

[services.development]
run = "pnpm --filter @workspace/kashmir-services run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kashmir-services", "run", "build" ]
publicDir = "artifacts/kashmir-services/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18592"
BASE_PATH = "/"
